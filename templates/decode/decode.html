{% extends 'decode/base.html' %}

{% block body_class %}decode-page{% endblock %}

{% block content %}
    <div class="decode-content">
    <div class="row">
        <form action="{% url 'decode' %}" method="post" id="decode-form">
        {% csrf_token %}
        <p class="grey-text text-darken-1 left-align" style="margin-top: 0; margin-bottom: 0.5rem;">Paste any text, emoji, or special characters.</p>
        {{ form }}
        <p class="decode-button-row center">
            <button id="decode-button" class="btn-large waves-effect waves-light green darken-2" type="submit">Examine</button>
            <button id="share-button" class="btn-large btn-outlined green darken-2" type="button" title="Copy link to clipboard">
                <i class="material-icons left">share</i>Share
            </button>
        </p>
        </form>
    </div>

    <div id="decode-results-container">
    {% include 'decode/_decode_results.html' %}
    </div><!-- #decode-results-container -->

    </div><!-- .decode-content -->

    {% load static %}
    <script src="{% static 'js/decode-clipboard.js' %}"></script>
    <script src="{% static 'js/decode-copy-char.js' %}"></script>
    <script src="{% static 'js/decode-live.js' %}"></script>
    <script>
// Per-row copy: clicking the copy icon in the Action column copies that row's character.
(function() {
  var table = document.getElementById('codepoint-details-table');
  if (window.decodeCopyChar) window.decodeCopyChar.attachCopyCharHandler(table);
})();

// Copy table button (shared with decode-live.js after inject)
if (window.decodeClipboard && window.decodeClipboard.attachCopyTableButton) {
  window.decodeClipboard.attachCopyTableButton();
}
    </script>

{% endblock %}
